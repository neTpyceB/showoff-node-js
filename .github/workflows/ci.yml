name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.14.1
          cache: npm
      - run: npm install
      - run: npm run check

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker compose build
      - run: docker compose run --rm test
      - run: docker compose up -d --wait api
      - run: node scripts/wait-for-http.js http://localhost:3000/auth/me 30 1000
      - run: API_URL=http://localhost:3000 ADMIN_EMAIL=admin@example.com ADMIN_PASSWORD=admin-password node scripts/smoke-auth.js
      - run: docker compose down --remove-orphans
