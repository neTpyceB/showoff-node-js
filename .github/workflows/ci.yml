name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 25.9.0
          cache: npm
      - run: npm ci
      - run: npm run check

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker compose build auth user payment test
      - run: docker compose run --rm test
      - run: docker compose down --remove-orphans
      - run: docker compose up -d --wait auth user payment
      - run: docker compose exec -T auth env AUTH_URL=http://auth:3000 USER_URL=http://user:3001 node scripts/request-smoke.js
      - run: docker compose down --remove-orphans
