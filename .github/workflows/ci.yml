name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 25.9.0
          cache: npm
      - run: npm ci
      - run: npm run check

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker compose build balancer backend-a backend-b test
      - run: docker compose run --rm test
      - run: docker compose down --remove-orphans
      - run: docker compose up -d --wait balancer backend-a backend-b redis
      - run: docker compose exec -T balancer env BALANCER_URL=http://balancer:3000 node scripts/request-smoke.js
      - run: docker compose down --remove-orphans
