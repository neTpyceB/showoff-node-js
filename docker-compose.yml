services:
  gateway:
    build:
      context: .
      target: runtime
    image: scalable-api-gateway:runtime
    depends_on:
      service-a:
        condition: service_healthy
      service-b:
        condition: service_healthy
    environment:
      AUTH_TOKEN: platform-token
      PORT: "3000"
      RATE_LIMIT_LIMIT: "2"
      RATE_LIMIT_WINDOW_MS: "1000"
      SERVICE_A_URL: http://service-a:3001
      SERVICE_B_URL: http://service-b:3002
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  service-a:
    build:
      context: .
      target: runtime
    image: scalable-api-gateway:runtime
    command: ["npm", "run", "start:service"]
    environment:
      PORT: "3001"
      SERVICE_NAME: service-a
    healthcheck:
      test: ["CMD", "node", "scripts/service-healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  service-b:
    build:
      context: .
      target: runtime
    image: scalable-api-gateway:runtime
    command: ["npm", "run", "start:service"]
    environment:
      PORT: "3002"
      SERVICE_NAME: service-b
    healthcheck:
      test: ["CMD", "node", "scripts/service-healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  test:
    build:
      context: .
      target: test
    image: scalable-api-gateway:test
