services:
  api:
    build:
      context: .
      target: runtime
    image: data-processing-service:runtime
    environment:
      PORT: "3000"
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/transform/csv-to-ndjson',{method:'POST',headers:{'Content-Type':'text/csv'},body:'name\nalice\n'}).then(async(response)=>process.exit(response.ok&&await response.text()==='{\"name\":\"alice\"}\n'?0:1)).catch(()=>process.exit(1))
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  test:
    build:
      context: .
      target: test
    image: data-processing-service:test
    profiles:
      - test
