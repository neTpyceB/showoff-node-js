services:
  auth:
    build:
      context: .
      target: runtime
    image: multi-service-backend:runtime
    environment:
      AUTH_SECRET: platform-secret
      PORT: "3000"
      SERVICE_NAME: auth
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  user:
    build:
      context: .
      target: runtime
    image: multi-service-backend:runtime
    depends_on:
      auth:
        condition: service_healthy
      payment:
        condition: service_healthy
    environment:
      AUTH_SERVICE_URL: http://auth:3000
      PAYMENT_SERVICE_URL: http://payment:3002
      PORT: "3001"
      SERVICE_NAME: user
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  payment:
    build:
      context: .
      target: runtime
    image: multi-service-backend:runtime
    environment:
      PORT: "3002"
      SERVICE_NAME: payment
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  test:
    build:
      context: .
      target: test
    image: multi-service-backend:test
