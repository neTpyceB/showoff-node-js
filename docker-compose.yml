services:
  api:
    build:
      context: .
      target: runtime
    image: event-driven-platform:runtime
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: "3000"
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: api
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  notifications:
    build:
      context: .
      target: runtime
    image: event-driven-platform:runtime
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: "3001"
      REDIS_URL: redis://redis:6379
      RETRY_AFTER_MS: "100"
      SERVICE_NAME: notifications
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  feed:
    build:
      context: .
      target: runtime
    image: event-driven-platform:runtime
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: "3002"
      REDIS_URL: redis://redis:6379
      RETRY_AFTER_MS: "100"
      SERVICE_NAME: feed
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  audit:
    build:
      context: .
      target: runtime
    image: event-driven-platform:runtime
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: "3003"
      REDIS_URL: redis://redis:6379
      RETRY_AFTER_MS: "100"
      SERVICE_NAME: audit
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  redis:
    image: redis:8.6.1-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  test:
    build:
      context: .
      target: test
    image: event-driven-platform:test
