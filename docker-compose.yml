services:
  balancer:
    build:
      context: .
      target: runtime
    image: high-performance-system:runtime
    depends_on:
      backend-a:
        condition: service_healthy
      backend-b:
        condition: service_healthy
    environment:
      BACKEND_URLS: http://backend-a:3001,http://backend-b:3002
      PORT: "3000"
      SERVICE_NAME: balancer
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  backend-a:
    build:
      context: .
      target: runtime
    image: high-performance-system:runtime
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: "3001"
      INSTANCE_ID: backend-a
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: backend
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  backend-b:
    build:
      context: .
      target: runtime
    image: high-performance-system:runtime
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: "3002"
      INSTANCE_ID: backend-b
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: backend
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  redis:
    image: redis:8.6.1-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  test:
    build:
      context: .
      target: test
    image: high-performance-system:test
