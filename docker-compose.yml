services:
  api:
    build:
      context: .
      target: runtime
    image: realtime-chat-backend:runtime
    environment:
      DATABASE_PATH: /data/chat.sqlite
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - chat-data:/data
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 1s
  test:
    build:
      context: .
      target: test
    image: realtime-chat-backend:test

volumes:
  chat-data:
